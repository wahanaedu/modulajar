            const monthIndex = parseInt(parts[1], 10) - 1;

        // --- APPLICATION WRAPPER ---

          const [users, setUsers] = useState(() => {
            const saved = localStorage.getItem('generator_users_db_soal');
            if (saved) {
              const parsed = JSON.parse(saved);
              if (!parsed.some(u => u.email === 'demo@modulajar.com')) {
                parsed.push({ email: 'demo@modulajar.com', password: 'demo', fullName: 'Guru Demo Kreatif', schoolName: 'SD Negeri Nusantara Cerdas', status: 'Aktif', role: 'user' });
              }
              return parsed;
            }
            return [
              { email: 'admin@modulajar.com', password: 'admin', fullName: 'Super Admin Kurikulum', schoolName: 'Dinas Pendidikan', status: 'Aktif', role: 'admin' },
              { email: 'demo@modulajar.com', password: 'demo', fullName: 'Guru Demo Kreatif', schoolName: 'SD Negeri Nusantara Cerdas', status: 'Aktif', role: 'user' },
              { email: 'budi@sekolah.id', password: 'password', fullName: 'Budi Santoso, S.Pd.', schoolName: 'SD Negeri Nusantara Cerdas', status: 'Aktif', role: 'user', paymentProof: 'simulated_proof' }
            ];
          });

          // Current Logged in User
          const [currentUser, setCurrentUser] = useState(() => {
            const savedUser = localStorage.getItem('generator_soal_user');
            return savedUser ? JSON.parse(savedUser) : null;
          });

          // State Data Modul Ajar / Soal
          const [formData, setFormData] = useState(() => {
            const saved = localStorage.getItem('generator_soal_data');
            return saved ? JSON.parse(saved) : INITIAL_EXAM_STATE;
          });

          // History State untuk Undo & Redo
          const [history, setHistory] = useState([JSON.stringify(INITIAL_EXAM_STATE)]);
          const [historyIndex, setHistoryIndex] = useState(0);
          const [toasts, setToasts] = useState([]);
          const [isAiGenerating, setIsAiGenerating] = useState(false);
          const previewRef = useRef(null);

          // Menyelaraskan penyimpanan data pengguna
          useEffect(() => {
            localStorage.setItem('generator_users_db_soal', JSON.stringify(users));
          }, [users]);

          useEffect(() => {
            localStorage.setItem('generator_soal_data', JSON.stringify(formData));
          }, [formData]);

          useEffect(() => {
            if (darkMode) {
              document.documentElement.classList.add('dark');
            } else {
              document.documentElement.classList.remove('dark');
            }
          }, [darkMode]);

          const safeValue = (val) => {
            if (typeof val === 'string') return val;
            if (Array.isArray(val)) return val.join('\n');
            if (typeof val === 'object' && val !== null) return JSON.stringify(val);
            return String(val || '');
          };

          const showToast = (message, type = 'success') => {
            const id = Date.now();
            setToasts((prev) => [...prev, { id, message, type }]);
            setTimeout(() => {
              setToasts((prev) => prev.filter((t) => t.id !== id));
            }, 4000);
          };

          const updateFormData = (newData) => {
            const updated = { ...formData, ...newData };
            setFormData(updated);

            const serialized = JSON.stringify(updated);
            const nextHistory = history.slice(0, historyIndex + 1);
            setHistory([...nextHistory, serialized]);
            setHistoryIndex(nextHistory.length);
          };

          const handleUndo = () => {
            if (historyIndex > 0) {
              const prevIndex = historyIndex - 1;
              setHistoryIndex(prevIndex);
              setFormData(JSON.parse(history[prevIndex]));
              showToast('Undo berhasil diterapkan', 'info');
            } else {
              showToast('Tidak ada perubahan untuk dibatalkan', 'warning');
            }
          };

          const handleRedo = () => {
            if (historyIndex < history.length - 1) {
              const nextIndex = historyIndex + 1;
              setHistoryIndex(nextIndex);
              setFormData(JSON.parse(history[nextIndex]));
              showToast('Redo berhasil diterapkan', 'info');
            } else {
              showToast('Sudah berada di draf terbaru', 'warning');
            }
          };

          useEffect(() => {

                    const externalUsers = await response.json();

                      const cleanDB = [
                        { email: 'admin@modulajar.com', password: 'admin', fullName: 'Super Admin Kurikulum', schoolName: 'Dinas Pendidikan', status: 'Aktif', role: 'admin' },

                          cleanDB.push({
                            email: ext.email,
                            password: 'password', 
                            fullName: ext.fullName,
                            schoolName: ext.schoolName,
                            status: ext.status || 'Pending',
                            role: ext.role || 'user',
                            paymentProof: ext.paymentProof || null
                          });
                        }
                      });
                      setUsers(cleanDB);
                      showToast('Sinkronisasi data pembeli Google Sheets berhasil!', 'success');
                    }
                  }
                } catch (err) {
                  console.error('Spreadsheet sync error:', err);
                }
              };
              fetchDatabase();
            }
          }, [activeTab]);

          const handleLoginSubmit = (e) => {
            e.preventDefault();
            if (!emailInput || !passwordInput) {
              showToast('Mohon isi alamat email dan kata sandi!', 'warning');
              return;
            }

            const foundUser = users.find(u => u.email === emailInput && u.password === passwordInput);
            
            if (!foundUser) {
              showToast('Kredensial salah! Mohon periksa kembali email & password.', 'warning');
              return;
            }

            if (foundUser.role !== 'admin' && foundUser.status !== 'Aktif') {
              showToast('Akun Anda belum diaktivasi oleh Admin. Bukti pembayaran harus diverifikasi terlebih dahulu.', 'warning');
              return;
            }

            setCurrentUser(foundUser);
            localStorage.setItem('generator_soal_user', JSON.stringify(foundUser));
            
            if (foundUser.role === 'admin') {
              showToast('Selamat datang, Admin! Panel verifikasi dibuka...', 'success');
              setActiveTab('admin');
            } else {
              updateFormData({

                                className="w-full px-2.5 py-2.5 rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-xs focus:outline-none text-slate-855 dark:text-slate-100"
                              >
                                {SUBJECT_OPTIONS.map(opt => (
                                  <option key={opt} value={opt}>{opt}</option>
                                ))}
                              </select>
                            </div>

                            <div>
                              <label className="block text-[10px] font-bold text-slate-400 uppercase mb-1.5 font-bold">Judul Ujian</label>
                              <input 
                                type="text" 
                                value={formData.judul}
                                onChange={(e) => updateFormData({ judul: e.target.value })}
                                className="w-full px-3 py-2 rounded-xl border border-slate-200 dark:border-slate-800 bg-transparent text-xs text-slate-855 dark:text-slate-100 focus:outline-none" 
                                placeholder="Asesmen Akhir Semester"
                              />
                            </div>
                          </div>

                          <div className="grid grid-cols-2 gap-3">
                            <div>
                              <label className="block text-[10px] font-bold text-slate-400 uppercase mb-1.5">Kelas</label>
                              <select 
                                value={formData.kelas}
                                onChange={(e) => updateFormData({ kelas: e.target.value })}
                                className="w-full px-2 py-2.5 rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-xs focus:outline-none text-slate-855 dark:text-slate-100"
                              >
                                {GRADE_OPTIONS.map(g => (
                                  <option key={g} value={g}>Kelas {g}</option>
                                ))}
                              </select>
                            </div>
                            <div>
                              <label className="block text-[10px] font-bold text-slate-400 uppercase mb-1.5">Semester</label>
                              <select 
                                value={formData.semester}
                                onChange={(e) => updateFormData({ semester: e.target.value })}
                                className="w-full px-2 py-2.5 rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-xs focus:outline-none text-slate-855 dark:text-slate-100"
                              >
                                {SEMESTER_OPTIONS.map(s => (
                                  <option key={s} value={s}>{s}</option>
                                ))}
                              </select>
                            </div>
                          </div>

                          <div className="grid grid-cols-2 gap-3">
                            <div>
                              <label className="block text-[10px] font-bold text-slate-400 uppercase mb-1.5">Alokasi Waktu</label>
                              <input 
                                type="text" 
                                value={formData.alokasiWaktu}
                                onChange={(e) => updateFormData({ alokasiWaktu: e.target.value })}
                                className="w-full px-2.5 py-2 rounded-xl border border-slate-200 dark:border-slate-800 bg-transparent text-xs text-slate-855 dark:text-slate-100" 
                                placeholder="E.g., 90 Menit"
                              />
                            </div>
                            <div>
                              <label className="block text-[10px] font-bold text-slate-400 uppercase mb-1.5">Tahun Ajaran</label>
                              <input 
                                type="text" 
                                value={formData.tahunAjaran}
                                onChange={(e) => updateFormData({ tahunAjaran: e.target.value })}
                                className="w-full px-3 py-2 rounded-xl border border-slate-200 dark:border-slate-800 bg-transparent text-xs text-slate-855 dark:text-slate-100 focus:outline-none" 
                                placeholder="E.g., 2026/2027"
                              />
                            </div>
                          </div>

                          <div className="grid grid-cols-2 gap-3">
                            <div>
                              <label className="block text-[10px] font-bold text-slate-400 uppercase mb-1.5">Kota Lokasi Pembuatan</label>
                              <input 
                                type="text" 
                                value={formData.city}
                                onChange={(e) => updateFormData({ city: e.target.value })}
                                className="w-full px-3 py-2 rounded-xl border border-slate-200 dark:border-slate-800 bg-transparent text-xs text-slate-855 dark:text-slate-100" 
                                placeholder="Kota Mataram"
                              />
                            </div>
                            <div>
                              <label className="block text-[10px] font-bold text-slate-400 uppercase mb-1.5">Tanggal Pelaksanaan</label>
                              <input 
                                type="date" 
                                value={formData.moduleDate}
                                onChange={(e) => updateFormData({ moduleDate: e.target.value })}
                                className="w-full px-3 py-1.5 rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-xs text-slate-855 dark:text-slate-100" 
                              />
                            </div>
                          </div>
                        </div>
                      )}

                      {/* SUB FORM 2: PARAMETER SOAL & TOPIC */}
                      {activeStep === 2 && (
                        <div className="space-y-4 animate-fadeIn">
                          <div>
                            <label className="block text-[10px] font-bold text-slate-400 uppercase mb-1.5">Materi Pokok / Bab Pembahasan</label>
                            <textarea 
                              value={formData.topik}
                              onChange={(e) => updateFormData({ topik: e.target.value })}
                              rows={3}
                              className="w-full px-3 py-2 rounded-xl border border-slate-200 dark:border-slate-800 bg-transparent text-xs text-slate-855 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 font-sans" 
                              placeholder="E.g., Macam-macam gaya, gerak benda, zat cair, perubahan benda padat"
                            />
                          </div>

                          <div className="grid grid-cols-2 gap-3">
                            <div>
                              <label className="block text-[10px] font-bold text-slate-400 uppercase mb-1.5">Tingkat Kesulitan</label>
                              <select 
                                value={formData.tingkatKesulitan}
                                onChange={(e) => updateFormData({ tingkatKesulitan: e.target.value })}
                                className="w-full px-2.5 py-2.5 rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-xs focus:outline-none text-slate-855 dark:text-slate-100"
                              >
                                {LEVEL_OPTIONS.map(opt => (
                                  <option key={opt} value={opt}>{opt}</option>
                                ))}
                              </select>
                            </div>

                            <div>
                              <label className="block text-[10px] font-bold text-slate-400 uppercase mb-1.5">Kurikulum</label>
                              <select 
                                className="w-full px-2.5 py-2.5 rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-xs focus:outline-none text-slate-855 dark:text-slate-100"
                              >
                                <option value="Merdeka">Kurikulum Merdeka</option>
                                <option value="K13">Kurikulum 2013 (K13)</option>
                              </select>
                            </div>
                          </div>

                          <div className="grid grid-cols-2 gap-3">
                            <div>
                              <label className="block text-[10px] font-bold text-slate-400 uppercase mb-1.5">Jumlah Pilihan Ganda (PG)</label>
                              <input 
                                type="number" 
                                min="1"
                                max="20"
                                value={soalPGBerapa}
                                onChange={(e) => setSoalPGBerapa(e.target.value)}
                                className="w-full px-3 py-2 rounded-xl border border-slate-200 dark:border-slate-800 bg-transparent text-xs text-slate-855 dark:text-slate-100" 
                              />
                            </div>

                            <div>
                              <label className="block text-[10px] font-bold text-slate-400 uppercase mb-1.5">Jumlah Soal Esai</label>
                              <input 
                                type="number" 
                                min="1"
                                max="10"
                                value={soalEsaiBerapa}
                                onChange={(e) => setSoalEsaiBerapa(e.target.value)}
                                className="w-full px-3 py-2 rounded-xl border border-slate-200 dark:border-slate-800 bg-transparent text-xs text-slate-855 dark:text-slate-100" 
                              />
                            </div>
                          </div>
                        </div>
                      )}
                    </div>

                    {/* BAGIAN BAWAH: NAVIGATION BUTTONS DI ATAS GENERATE AI MODUL */}
                    <div className="space-y-4 pt-6 border-t border-slate-100 dark:border-slate-800 font-sans">
                      <div className="flex items-center justify-between gap-3">
                        <button
                          type="button"
                          onClick={() => { if (activeStep > 1) setActiveStep(activeStep - 1); }}
                          disabled={activeStep === 1}
                          className="flex-1 py-2.5 rounded-xl border border-slate-200 hover:bg-slate-50 dark:border-slate-800 text-xs font-bold text-slate-500 disabled:opacity-30 transition focus:outline-none"
                        >
                          Sebelumnya
                        </button>
                        <button
                          type="button"
                          onClick={() => {
                            if (activeStep < 2) {
                              setActiveStep(activeStep + 1);
                            } else {
                              showToast('Parameter soal siap dikompilasi. Tekan tombol "Generate Soal AI" di bawah.', 'info');
                            }
                          }}
                          className="flex-1 py-2.5 bg-slate-900 hover:bg-slate-800 dark:bg-slate-800 dark:hover:bg-slate-700 text-white text-xs font-bold rounded-xl transition focus:outline-none"
                        >
                          {activeStep === 2 ? 'Selesai' : 'Lanjutkan'}
                        </button>
                      </div>

                      <div className="p-4 bg-gradient-to-tr from-slate-50 to-indigo-50/40 dark:from-slate-900 dark:to-indigo-950/20 border border-indigo-100/50 dark:border-indigo-900/50 rounded-2xl space-y-2.5 font-sans">
                        <div className="flex items-center gap-1.5 font-sans">
                          <Icon name="sparkles" className="w-4 h-4 text-amber-500 animate-pulse" />
                          <span className="text-[10px] font-extrabold text-indigo-700 dark:text-indigo-300 uppercase tracking-widest font-sans">Penyusunan Otomatis AI</span>
                        </div>
                        <p className="text-[10px] text-slate-455 dark:text-slate-400 leading-normal font-sans">
                          Kecerdasan buatan menyusun butir soal ujian secara otomatis menyesuaikan indikator materi, HOTS, and kunci pembahasan instan.
                        </p>
                        <button
                          type="button"
                          onClick={handleAiAutoGenerate}
                          disabled={isAiGenerating}
                          className="w-full py-3 bg-gradient-to-r from-blue-600 via-indigo-600 to-purple-600 hover:brightness-110 text-white font-extrabold text-xs rounded-xl flex items-center justify-center gap-1.5 shadow-md shadow-indigo-100 dark:shadow-none transition disabled:opacity-50 focus:outline-none"
                        >
                          {isAiGenerating ? (
                            <>
                              <Icon name="refreshcw" className="w-4 h-4 animate-spin" /> Sedang Menyusun Soal...
                            </>
                          ) : (
                            <>
                              <Icon name="sparkles" className="w-4 h-4 text-amber-300 animate-pulse" /> Generate Soal AI
                            </>
                          )}
                        </button>
                      </div>
                    </div>
                  </main>

                  {/* PANEL KANAN: REALTIME LIVE PREVIEW (A4 SHEET STYLE) */}
                  <section className="flex-1 bg-slate-100 dark:bg-slate-900/60 p-6 flex flex-col space-y-4 rounded-3xl border border-slate-200/60 dark:border-slate-800/60 font-sans">
                    <div className="flex flex-wrap items-center justify-between gap-3 bg-white dark:bg-slate-900 p-4 rounded-2xl border border-slate-200/80 dark:border-slate-800 shadow-sm font-sans">
                      <div className="flex items-center gap-2">
                        <Icon name="eye" className="w-5 h-5 text-indigo-500 animate-pulse" />
                        <span className="font-extrabold text-xs uppercase tracking-wide">Pratinjau Hasil Cetak</span>
                      </div>
                      <div className="flex items-center gap-2">
                        <button
                          onClick={handleCetakLangsung}
                          className="px-3.5 py-2 rounded-xl text-xs font-bold border border-slate-200 hover:bg-slate-50 dark:border-slate-800 text-slate-600 dark:text-slate-300 flex items-center gap-1.5 transition focus:outline-none"
                        >
                          <Icon name="printer" className="w-3.5 h-3.5" /> Cetak Langsung
                        </button>
                        <button
                          onClick={handleExportDOCX}
                          className="px-3.5 py-2 rounded-xl text-xs font-bold border border-slate-200 hover:bg-slate-50 dark:border-slate-800 text-slate-600 dark:text-slate-300 flex items-center gap-1.5 transition focus:outline-none"
                        >
                          <Icon name="filedown" className="w-3.5 h-3.5 text-blue-500" /> Word DOCX
                        </button>
                        <button
                          onClick={handleExportPDF}
                          className="px-4 py-2 rounded-xl text-xs font-extrabold bg-rose-600 hover:bg-rose-700 text-white flex items-center gap-1.5 shadow-md transition"
                        >
                          <Icon name="download" className="w-3.5 h-3.5" /> Simpan PDF
                        </button>
                      </div>
                    </div>

                    {/* PREVIEW CONTAINER */}
                    <div className="flex-1 overflow-y-auto max-h-[85vh] flex justify-center p-2 animate-fadeIn">
                      <div 
                        ref={previewRef}
                        className="w-full max-w-[800px] bg-white dark:bg-slate-900 shadow-2xl rounded-lg p-10 font-serif-print text-slate-850 dark:text-slate-100 min-h-[1123px] relative border border-slate-200 dark:border-slate-800"
                        style={{ fontSize: '11px', lineHeight: '1.5' }}
                      >
                        {/* Header Dokumen / Logo Dinamis */}
                        <div className="flex items-center justify-between border-b-2 border-slate-800 dark:border-slate-100 pb-4 mb-5 font-sans">
                          <div className="w-14 h-14 bg-slate-100 dark:bg-slate-850 rounded flex items-center justify-center text-[9px] text-slate-400">
                            LOGO
                          </div>
                          <div className="text-center flex-1 mx-4 animate-fadeIn">
                            <h1 className="font-extrabold text-xs uppercase tracking-wide leading-tight">
                              PEMERINTAH KABUPATEN / KOTA
                            </h1>
                            <h2 className="font-bold text-[10px] uppercase tracking-normal font-sans font-bold">
                              DINAS PENDIDIKAN {safeValue(formData.city).toUpperCase()}
                            </h2>
                            <h3 className="font-bold text-[11px] uppercase text-indigo-700 dark:text-indigo-400">
                              {formData.schoolName}
                            </h3>
                            <p className="text-[8px] font-sans text-slate-500 italic mt-0.5">{formData.schoolAddress}</p>
                          </div>
                          <div className="w-14 h-14" />
                        </div>

                        <div className="text-center mb-6 font-sans">
                          <h4 className="font-bold text-sm underline uppercase font-serif-print">{safeValue(formData.judul).toUpperCase()}</h4>
                          <span className="text-[10px] uppercase font-sans tracking-widest text-slate-400 font-bold">TAHUN AJARAN {formData.tahunAjaran}</span>
                        </div>

                        {/* TABEL DATA IDENTITAS */}
                        <section className="mb-6 font-sans">
                          <table className="w-full border border-slate-200 dark:border-slate-800 text-left font-serif-print">
                            <tbody>
                              <tr>
                                <td className="p-2 bg-slate-50 dark:bg-slate-800/40 font-bold w-1/3 text-[10px]">Mata Pelajaran</td>
                                <td className="p-2 text-[10px] font-semibold">{formData.mataPelajaran}</td>
                              </tr>
                              <tr className="border-b border-t border-slate-200 dark:border-slate-800">
                                <td className="p-2 bg-slate-50 dark:bg-slate-800/40 font-bold text-[10px]">Hari / Tanggal</td>
                                <td className="p-2 text-[10px]">{formatIndoDate(formData.moduleDate)}</td>
                              </tr>
                              <tr className="border-b border-slate-200 dark:border-slate-800">
                                <td className="p-2 bg-slate-50 dark:bg-slate-800/40 font-bold text-[10px]">Kelas / Semester</td>
                                <td className="p-2 text-[10px]">Kelas {formData.kelas} / Semester {formData.semester}</td>
                              </tr>
                              <tr>
                                <td className="p-2 bg-slate-50 dark:bg-slate-800/40 font-bold text-[10px]">Alokasi Waktu</td>
                                <td className="p-2 text-[10px]">{formData.alokasiWaktu}</td>
                              </tr>
                            </tbody>
                          </table>
                        </section>

                        {/* BAGIAN I: PILIHAN GANDA */}
                        <section className="mb-6 font-serif-print">
                          <h3 className="font-bold text-[12px] uppercase mb-3 tracking-wide">I. Pilihan Ganda (PG)</h3>
                          <p className="text-[9px] text-slate-500 italic mb-4 font-sans">Petunjuk: Berilah tanda silang (X) pada huruf A, B, C, atau D yang Anda anggap paling benar!</p>
                          
                          <div className="space-y-4">
                            {(Array.isArray(formData.pilihanGanda) ? formData.pilihanGanda : []).map((pg, idx) => (
                              <div key={idx} className="space-y-1.5 animate-fadeIn">
                                <p className="font-medium text-[11px] text-slate-850 dark:text-slate-100">{idx + 1}. {pg.pertanyaan}</p>
                                <div className="grid grid-cols-2 gap-x-4 pl-3 font-sans text-[10px] text-slate-600 dark:text-slate-400">
                                  {(Array.isArray(pg.pilihan) ? pg.pilihan : []).map((opt, oIdx) => (
                                    <span key={oIdx} className="py-0.5">{opt}</span>
                                  ))}
                                </div>
                              </div>
                            ))}
                          </div>
                        </section>

                        {/* BAGIAN II: ESAI */}
                        <section className="mb-6 font-serif-print">
                          <h3 className="font-bold text-[12px] uppercase mb-3 tracking-wide border-t pt-4">II. Esai / Uraian</h3>
                          <p className="text-[9px] text-slate-550 italic mb-4 font-sans">Petunjuk: Jawablah pertanyaan-pertanyaan di bawah ini dengan singkat, jelas, dan tepat!</p>
                          
                          <div className="space-y-6">
                            {(Array.isArray(formData.esai) ? formData.esai : []).map((es, idx) => (
                              <div key={idx} className="space-y-1.5 animate-fadeIn">
                                <p className="font-medium text-[11px] text-slate-850 dark:text-slate-100">{idx + 1}. {es.pertanyaan}</p>
                                <div className="h-14 border-b border-dashed border-slate-300 dark:border-slate-800" />
                              </div>
                            ))}
                          </div>
                        </section>

                        {/* HALAMAN LAMPIRAN KUNCI JAWABAN */}
                        <section className="mt-8 pt-6 border-t border-double border-slate-500 font-sans">
                          <h4 className="font-extrabold text-[11px] text-indigo-700 dark:text-indigo-400 uppercase tracking-widest mb-3">
                            Lampiran: Kunci Jawaban & Solusi Penilaian
                          </h4>
                          
                          <div className="space-y-4 text-[10px] leading-relaxed text-slate-700 dark:text-slate-300">
                            <div>
                              <strong className="block text-slate-900 dark:text-white mb-1.5">A. Kunci Jawaban Pilihan Ganda:</strong>
                              <div className="grid grid-cols-2 gap-2">
                                {(Array.isArray(formData.pilihanGanda) ? formData.pilihanGanda : []).map((pg, idx) => (
                                  <div key={idx} className="p-2 bg-slate-50 dark:bg-slate-850 rounded">
                                    <strong>No {idx + 1}: Kunci ({pg.kunciJawaban})</strong>
                                    <p className="text-[9px] text-slate-400 mt-0.5">Pembahasan: {pg.pembahasan}</p>
                                  </div>
                                ))}
                              </div>
                            </div>

                            <div className="pt-2">
                              <strong className="block text-slate-900 dark:text-white mb-1.5">B. Pedoman Solusi Uraian Esai:</strong>
                              <div className="space-y-2">
                                {(Array.isArray(formData.esai) ? formData.esai : []).map((es, idx) => (
                                  <div key={idx} className="p-2.5 bg-slate-50 dark:bg-slate-850 rounded">
                                    <strong>No {idx + 1} (Bobot Maks: {es.skorMaksimal}):</strong>
                                    <p className="text-[9px] text-slate-400 mt-0.5">Jawaban Ideal: {es.kunciJawaban}</p>
                                  </div>
                                ))}
                              </div>
                            </div>
                          </div>
                        </section>

                      </div>
                    </div>
                  </section>
                </div>
              )}

            </div>
          );
        }

        // Render App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
